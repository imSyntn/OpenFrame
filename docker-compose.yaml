services:
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - docker.env
    depends_on:
      - postgres
      - redis
      - kafka
  worker-engagement-db-write:
    build:
      context: .
      dockerfile: apps/worker-engagement-db-write/Dockerfile
    env_file:
      - docker.env
    depends_on:
      - postgres
      - redis
      - kafka
  worker-image-db-write:
    build:
      context: .
      dockerfile: apps/worker-image-db-write/Dockerfile
    env_file:
      - docker.env
    depends_on:
      - postgres
      - redis
      - kafka
  worker-image-finalize:
    build:
      context: .
      dockerfile: apps/worker-image-finalize/Dockerfile
    env_file:
      - docker.env
    depends_on:
      - redis
      - kafka
  worker-image-metadata:
    build:
      context: .
      dockerfile: apps/worker-image-metadata/Dockerfile
    env_file:
      - docker.env
    depends_on:
      - redis
      - kafka
  worker-image-processor:
    build:
      context: .
      dockerfile: apps/worker-image-processor/Dockerfile
    env_file:
      - docker.env
    depends_on:
      - redis
      - kafka
  postgres:
    image: postgres:16-alpine
    container_name: openframe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openframe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: openframe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://kafka:9092
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --set redpanda.kafka_max_message_bytes=1048576000
    ports:
      - "9092:9092"
  setup:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    working_dir: /app
    env_file:
      - docker.env
    depends_on:
      - postgres
      - redis
      - kafka
    command: pnpm --filter @workspace/lib run setup:all
    restart: "no"
    user: root

volumes:
  postgres_data:
  redis_data:
